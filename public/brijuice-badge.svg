<svg xmlns="http://www.w3.org/2000/svg" width="220" height="100" viewBox="0 0 220 100" role="img" aria-labelledby="title desc">
  <title id="title">BRIJUICE Badge</title>
  <desc id="desc">Rounded gradient capsule with the word BRIJUICE in white capital letters</desc>
  <defs>
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1cb698" />
      <stop offset="100%" stop-color="#f1b322" />
    </linearGradient>
  </defs>
  <rect x="5" y="10" width="210" height="80" rx="40" fill="url(#badgeGradient)" />
  <text x="110" y="70" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="4">BRIJUICE</text>
</svg>
