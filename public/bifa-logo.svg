<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Red oval background -->
  <ellipse cx="200" cy="100" rx="190" ry="80" fill="url(#redGradient)" stroke="#FFFFFF" stroke-width="6"/>
  <!-- White "Bifa" text -->
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">Bifa</text>
</svg>